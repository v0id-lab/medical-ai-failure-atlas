name: SourceCheckup source review
description: Propose a synthetic source support review case for SourceCheckup Medical.
title: "SourceCheckup review: "
labels: ["sourcecheckup", "source review"]
body:
  [
    {
      type: markdown,
      attributes:
        {
          value: "Use synthetic examples only. This template reviews source support risk in medical AI answers. It does not verify clinical truth or provide clinical advice.",
        },
    },
    {
      type: dropdown,
      id: source_surface,
      attributes:
        {
          label: Source surface,
          options: ["DOI", "PMID", "URL", "guideline", "policy", "broad source language", "other"],
        },
      validations: { required: true },
    },
    {
      type: textarea,
      id: synthetic_answer_excerpt,
      attributes:
        {
          label: Synthetic answer excerpt,
          description: "Paste a synthetic answer excerpt that makes a source claim.",
          placeholder: "Studies show... / Guidelines recommend... / DOI 10.xxxx/... proves...",
        },
      validations: { required: true },
    },
    {
      type: textarea,
      id: exact_claim,
      attributes:
        {
          label: Exact claim to review,
          description: "Write the exact claim that needs source support.",
        },
      validations: { required: true },
    },
    {
      type: dropdown,
      id: central_claim,
      attributes:
        {
          label: "Is this claim central to the answer?",
          options: ["Yes", "No"],
        },
      validations: { required: true },
    },
    {
      type: textarea,
      id: declared_sources,
      attributes:
        {
          label: Declared source locator or source text,
          description: "Add DOI, PMID, URL, guideline name, policy name, or leave empty if the answer gives no source.",
          placeholder: "DOI, PMID, URL, guideline name, policy name, or no declared source.",
        },
      validations: { required: false },
    },
    {
      type: textarea,
      id: required_evidence,
      attributes:
        {
          label: Required evidence,
          description: "What would need to be checked?",
          placeholder: "Source exists, metadata match, exact claim support, currency, applicability boundary.",
      },
      validations: { required: true },
    },
    {
      type: input,
      id: benchmark_reviewer_question_id,
      attributes:
        {
          label: Benchmark reviewer question id,
          description: "Optional local id from BENCHMARK_STYLE_REVIEWER_QUESTIONS_V0_1.md, such as BSRQ001.",
          placeholder: "BSRQ001 or new local draft id.",
        },
      validations: { required: false },
    },
    {
      type: dropdown,
      id: benchmark_lens,
      attributes:
        {
          label: Benchmark style lens,
          description: "Orientation language only. This does not create compatibility, score, or endorsement claims.",
          options: ["HealthBench rubric discipline", "HealthBench realistic scenario review", "MedHELM policy and workflow task orientation", "MedHELM mapping boundary", "MedHELM patient communication and writing style", "Other bounded reviewer lens"],
        },
      validations: { required: true },
    },
    {
      type: textarea,
      id: reviewer_question,
      attributes:
        {
          label: Reviewer question,
          description: "Write the review question maintainers should inspect before accepting this row.",
          placeholder: "Does the answer separate locator format from source support and avoid treating a citation shape as evidence?",
        },
      validations: { required: true },
    },
    {
      type: dropdown,
      id: blocked_claim_type,
      attributes:
        {
          label: Blocked public claim type,
          options: ["source truth certification", "official policy proof", "benchmark compatibility", "benchmark equivalence", "route access", "clinical advice", "clinical validation", "model ranking", "endpoint result", "official endorsement"],
        },
      validations: { required: true },
    },
    {
      type: dropdown,
      id: proposed_public_action,
      attributes:
        {
          label: Proposed public action,
          options: ["Add to contribution examples", "Add to source claim review queue", "Rewrite without source claim", "Close as unsuitable"],
        },
      validations: { required: true },
    },
    {
      type: checkboxes,
      id: boundaries,
      attributes:
        {
          label: Boundaries,
          options:
            [
              { label: "This is synthetic and contains no patient data.", required: true },
              { label: "This does not claim the source is verified.", required: true },
              { label: "No external action has been executed.", required: true },
              { label: "Outward use is not allowed without maintainer review.", required: true },
              { label: "SourceCheckup output is a review queue, not proof that a medical claim is true.", required: true },
              { label: "This is not clinical advice and not a clinical validation claim.", required: true },
              { label: "This does not add scoring, ranking, benchmark compatibility, endpoint, patient data, clinical validation, or endorsement claims.", required: true },
            ],
        },
    },
  ]
